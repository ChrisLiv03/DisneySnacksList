<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snacks for Disney</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="snack-contain">

        <div id="header">
            <h1>Snacks to Eat</h1>
        </div>

        <div id="snack-form">
            <input
                type="text"
                class="input-item"
                name="input_box"
                id="input-box"
            />
            <button id="input-button" onclick="addSnack()">Add Snack</button>
        </div>
        <h2>Snack List</h2>
        <ul id="list-contain"></ul>
    </div>
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
